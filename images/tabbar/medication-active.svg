<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 
    TabBar Icon: Medication Active (药品 - 选中)
    Primary: #059669
    Style: Filled with glow
  -->
  
  <!-- 外发光 -->
  <ellipse cx="24" cy="24" rx="18" ry="14" fill="#059669" opacity="0.12"/>
  
  <!-- 药丸主体（填充） -->
  <rect 
    x="10" 
    y="16" 
    width="28" 
    height="16" 
    rx="8"
    fill="#059669"
    opacity="0.9"
  />
  
  <!-- 药丸轮廓（保持清晰） -->
  <rect 
    x="10" 
    y="16" 
    width="28" 
    height="16" 
    rx="8"
    stroke="#059669" 
    stroke-width="2" 
    fill="none"
  />
  
  <!-- 中间分割线 -->
  <line 
    x1="24" 
    y1="16" 
    x2="24" 
    y2="32" 
    stroke="#FFFFFF" 
    stroke-width="2" 
    stroke-linecap="round"
    opacity="0.6"
  />
  
  <!-- 高光 -->
  <line 
    x1="15" 
    y1="20" 
    x2="19" 
    y2="20" 
    stroke="#FFFFFF" 
    stroke-width="1.5" 
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
