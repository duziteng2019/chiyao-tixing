<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 
    TabBar Icon: Medication (药品)
    Style: Outline (未选中状态)
    Color: #9CA3AF
  -->
  
  <!-- 药丸主体（胶囊形状） -->
  <rect 
    x="10" 
    y="16" 
    width="28" 
    height="16" 
    rx="8"
    stroke="#9CA3AF" 
    stroke-width="2" 
    fill="none"
  />
  
  <!-- 药丸中间分割线 -->
  <line 
    x1="24" 
    y1="16" 
    x2="24" 
    y2="32" 
    stroke="#9CA3AF" 
    stroke-width="2" 
    stroke-linecap="round"
  />
  
  <!-- 高光效果线 -->
  <line 
    x1="15" 
    y1="20" 
    x2="19" 
    y2="20" 
    stroke="#9CA3AF" 
    stroke-width="1.5" 
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
